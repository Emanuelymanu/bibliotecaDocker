services:
  banco:
    image: mysql:8.0
    container_name: database
    restart: always
    env_file:
      - ./.env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - dados_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 25s
    networks:
      - app-network

  backend:
    build:
      context: ./Backend-Projeto
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    environment:
      DB_HOST: banco
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
    depends_on:
      banco:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - app-network

  frontend:
    build:
      context: ./Frontend-Projeto/ProjetoFrontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    expose:
      - "5173"
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_proxy
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - app-network

volumes:
  dados_mysql:

networks:
  app-network:
    driver: bridge
